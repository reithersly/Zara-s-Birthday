<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://olcmlvpwicbcnrbdtggr.supabase.co';
const SUPABASE_ANON = 'sb_publishable_4naZ6YJshwM6SANFOlIfXg_-iF6Jw-Y';

const { createClient } = supabase;

const db = createClient(SUPABASE_URL, SUPABASE_ANON);

let allMessages = [];

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function fmtTime(date) {
  return new Date(date).toLocaleString('en-GB', {
    dateStyle: 'medium',
    timeStyle: 'short'
  });
}

let toastTimer;

function showToast(msg) {
  const toast = document.getElementById('toast');

  toast.textContent = msg;
  toast.classList.add('show');

  clearTimeout(toastTimer);

  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

function renderMessages() {
  const list = document.getElementById('msgList');
  const count = document.getElementById('msgCount');

  if (!allMessages.length) {
    count.textContent = 'No messages yet 🌸';

    list.innerHTML = `
      <div class="empty-state">
        Be the first to leave a message 💌
      </div>
    `;

    return;
  }

  count.textContent =
    `${allMessages.length} messages received 💌`;

  list.innerHTML = '';

  allMessages.forEach(msg => {
    const div = document.createElement('div');

    div.className = 'msg-item';

    div.innerHTML = `
      <div class="msg-sender">
        ${
          msg.is_anon
            ? '🎭 Anonymous'
            : '🌸 ' + escHtml(msg.name || 'Someone')
        }
      </div>

      <div class="msg-text">
        ${escHtml(msg.message)}
      </div>

      <div class="msg-time">
        ${fmtTime(msg.created_at)}
      </div>
    `;

    list.appendChild(div);
  });
}

async function loadMessages() {
  const { data, error } = await db
    .from('messages')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);

    document.getElementById('msgList').innerHTML = `
      <div class="empty-state">
        Failed to load messages 😢
      </div>
    `;

    return;
  }

  allMessages = data || [];

  renderMessages();
}

async function submitMsg() {
  const btn = document.getElementById('sendBtn');

  const anon =
    document.getElementById('anonCheck').checked;

  const name =
    document.getElementById('senderName')
    .value
    .trim();

  const text =
    document.getElementById('msgText')
    .value
    .trim();

  if (!text) {
    showToast('Write a message first 💬');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  const { error } = await db
    .from('messages')
    .insert([
      {
        name: anon ? null : (name || 'Someone'),
        message: text,
        is_anon: anon
      }
    ]);

  if (error) {
    console.error(error);
    showToast(error.message);
  } else {
    document.getElementById('senderName').value = '';
    document.getElementById('msgText').value = '';
    document.getElementById('anonCheck').checked = false;

    showToast('Message sent 🎉');
  }

  btn.disabled = false;
  btn.textContent = 'Send Message 🎉';
}

function subscribeRealtime() {
  db.channel('messages-realtime')
    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'messages'
      },
      payload => {
        allMessages.unshift(payload.new);
        renderMessages();
      }
    )
    .subscribe(status => {
      const dot = document.getElementById('rtDot');
      const label = document.getElementById('rtLabel');

      if (status === 'SUBSCRIBED') {
        dot.classList.add('live');
        label.textContent =
          'live · messages update instantly';
      } else {
        dot.classList.remove('live');
        label.textContent = 'offline';
      }
    });
}

document
  .getElementById('msgText')
  .addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) {
      submitMsg();
    }
  });

loadMessages().then(() => {
  subscribeRealtime();
});
</script>
